<!doctype html><html><head><meta charset="utf-8"><style>
:root{--ink:#0B0F14;--cream:#F1F1E2;--accent:#6E8FD6;--ok:#7fe3b0;--muted:#9aa0ad}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1920px;height:1080px;background:var(--ink);overflow:hidden}
.stage{width:1920px;height:1080px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--cream);font-family:"Helvetica Neue",Arial,sans-serif;
  background:radial-gradient(1100px 700px at 50% 35%,rgba(60,59,98,.35),transparent 62%),var(--ink)}
.kicker{font-size:30px;letter-spacing:.42em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:34px}
.watch{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:230px;line-height:1;color:var(--ok);font-weight:600;letter-spacing:-2px}
.sub{font-family:"Iowan Old Style",Palatino,Georgia,serif;font-size:52px;margin-top:30px;color:var(--cream)}
.tag{margin-top:16px;font-size:24px;color:var(--muted)}
</style></head><body><div class="stage">
  <div class="kicker">The second time</div>
  <div class="watch">15<span style="font-size:120px">s</span></div>
  <div class="sub">Standing Approval &mdash; zero LLM calls on the fast path</div>
  <div class="tag">this demo's on-screen stopwatch</div>
</div></body></html>
