# Precedent ACTION-CLASS pack — the authoring-kit surface (WP-POLICY).
#
# This pack SPLITS OUT sim-executable action classes from the core policy_pack.yaml so the
# `precedent policy lint` CLI can enforce the authoring contract on them: every executable
# class MUST declare a TRUE inverse (a real rollback) and a verification probe, or it is
# REJECTED. Schema doc: docs/policy-action-class-schema.md.
#
# Seeded from the HEAD of the 558 recurring UCI fix classes (data/analysis/uci-baseline-
# results.md — 558 classes recur >=4 times, covering 94.8% of volume; both figures are in
# docs/numbers.md). Each class carries a `precedent_ref` to its anonymised UCI fix class
# (category|subcategory|closed_code) so the lineage from "real recurring incident" to
# "sim-executable action class" is explicit. NO per-class occurrence count is asserted: the
# corpus is anonymised and the individual counts are NOT measured/published in docs/numbers.md,
# so stating them would present an unverified number as fact. The UCI corpus is anonymised
# (Category N / Subcategory N / code N); the MediaCo error_code + typed action are the
# executable mapping onto our sim.
#
# RULE 2 still holds: nothing here is chosen by an LLM. The class_key is the deterministic
# fingerprint; this pack only records the deterministic policy + rollback contract for it.
version: 1

classes:
  # 1 — head class: among the most recurrent republish fix classes in the corpus HEAD.
  "publisher|PUB-EPG-4223|schedule_item":
    risk_class: standard_change
    policy_rule_id: PUB-EPG-4223-REPUBLISH
    ladder_ceiling: L2
    action_type: republish_epg
    required_approver_role: publishing-ops
    lineage_refs: ["kb:KB-0001"]
    precedent_ref:
      corpus: UCI-498
      fix_class: "Category 42|Subcategory 223|code 6"
    inverse:
      strategy: restore_snapshot     # pre-state captured before execute; restore reverts it
      reversible: true
      tool: restore
    verification_probe:
      strategy: object_health         # sim /verify — object must read healthy post-fix
      expect_healthy: true

